version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: animonsync-db
    environment:
      POSTGRES_DB: animonsync_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - animonsync-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: animonsync-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/animonsync_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: mySecretKeyForAnimonSyncThatIsAtLeast256BitsLongForHS256Algorithm
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - animonsync-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  animonsync-network:
    driver: bridge
